# ============================================================
# P3 — Central configuration
# ALL hyperparameters live here. Never hardcode values in
# notebooks or src/ modules. Import via src/config.py.
# ============================================================

# --- Model ---
model:
  name: "facebook/dino-vitb16"
  image_size: 224
  patch_size: 16
  num_registers: 0

# --- SAE ---
sae:
  source: "prisma"
  target_layers: [4, 6, 9]
  primary_layer: 9
  l0_target: 1200
  dead_feature_threshold: 0.01
  # Pre-trained SAE repo IDs (Prisma-Multimodal on HuggingFace)
  # Naming pattern: DINO-vanilla-x64-all_patches_{layer}-resid_post-{L0}-{explained_var}
  sae_repos:
    4: "Prisma-Multimodal/DINO-vanilla-x64-all_patches_4-resid_post-876-99"
    6: "Prisma-Multimodal/DINO-vanilla-x64-all_patches_6-resid_post-962-99"
    9: "Prisma-Multimodal/DINO-vanilla-x64-all_patches_9-resid_post-1105-99"

# --- Dataset ---
data:
  imagenet_val_path: "data/imagenet_val"
  cache_size: 5000

# --- Features ---
features:
  top_k_patches: 20
  clip_model: "openai/clip-vit-base-patch32"
  clip_context_size: 48 # px crop window (in model image space) centered on each patch before upscaling to CLIP input size
  monosemanticity_top_n: 50
  min_activation_threshold: 0.5 # min peak activation for reliable CLIP labels (not the same as sae.dead_feature_threshold)
  ms_max_patches: 5 # patches used per feature in Pach et al. Eq. 9

# --- CaFE locality analysis ---
cafe:
  n_images: 20        # top-N images per feature for ERF check
  ig_steps: 50        # integrated gradients interpolation steps
  batch_size: 8       # images per forward pass during IG

# --- Outputs ---
outputs:
  cache_path: "outputs/caches/activations.h5"
  figures_path: "outputs/figures"
  report_figures_path: "report/figures"
